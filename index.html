<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ditherium — Dithering Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Unbounded:wght@300;400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
    --border: #2a2a2a; --text: #f0ede8;
    --muted: #666; --accent: #e8d5b0; --accent2: #c4a882;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow-x: hidden;
  }

  /* ── Hero ── */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    padding: 3rem 2rem;
  }

  /* barely-visible background */
  .hero-bg {
    position: absolute;
    inset: 0;
    background: url('hero.jpg') center center / cover no-repeat;
    opacity: 0.20;
    filter: grayscale(30%);
    transform: scale(1.04);
    z-index: 0;
  }

  /* vignette gradient over the bg */
  .hero-vignette {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 60%, transparent 30%, var(--bg) 80%),
      linear-gradient(to bottom, var(--bg) 0%, transparent 20%, transparent 80%, var(--bg) 100%);
    z-index: 1;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
  }

  /* ── Logo ── */
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--accent);
  }
  .logo-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: block;
    flex-shrink: 0;
  }

  /* ── Headline ── */
  .headline {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(2rem, 6vw, 3.8rem);
    font-weight: 700;
    line-height: 1.08;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  .headline em {
    font-style: normal;
    color: var(--accent);
  }

  .sub {
    font-size: clamp(12px, 1.5vw, 14px);
    color: var(--muted);
    letter-spacing: 0.06em;
    line-height: 1.7;
    max-width: 480px;
  }

  /* ── CTA ── */
  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--accent2);
    color: #1a1209;
    font-family: 'Unbounded', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-decoration: none;
    padding: 14px 32px;
    border-radius: 6px;
    transition: background 0.18s, transform 0.18s;
    white-space: nowrap;
  }
  .cta-btn:hover {
    background: var(--accent);
    transform: translateY(-2px);
  }
  .cta-btn svg { flex-shrink: 0; }

  .hint {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    opacity: 0.7;
  }

  /* ── Before / After Section ── */
  .compare-section {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 900px;
    padding: 0 2rem 6rem;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
  }

  .section-label {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::before,
  .section-label::after {
    content: '';
    display: block;
    height: 1px;
    width: 40px;
    background: var(--border);
  }

  .compare-wrap {
    position: relative;
    width: 100%;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: col-resize;
    user-select: none;
    /* fixed aspect to match the hero.jpg landscape ratio */
    aspect-ratio: 16 / 9;
    background: var(--bg);
    box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 0 1px var(--border);
  }

  .compare-wrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
  }

  /* BEFORE layer – full image with blur/desaturate */
  .compare-before {
    z-index: 1;
    filter: grayscale(100%) blur(0.5px);
  }

  /* AFTER layer – dithered, clipped by divider */
  .compare-after {
    z-index: 2;
    clip-path: inset(0 50% 0 0);
  }

  /* divider line */
  .compare-divider {
    position: absolute;
    top: 0;
    left: 50%;
    width: 2px;
    height: 100%;
    background: var(--accent);
    z-index: 3;
    transform: translateX(-50%);
    pointer-events: none;
    box-shadow: 0 0 8px rgba(232,213,176,0.5);
  }
  .compare-handle {
    position: absolute;
    top: 50%;
    left: 50%;
    z-index: 4;
    transform: translate(-50%, -50%);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid var(--bg);
    box-shadow: 0 0 12px rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #1a1209;
    pointer-events: none;
  }

  /* labels on before / after */
  .compare-tag {
    position: absolute;
    bottom: 14px;
    z-index: 5;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    pointer-events: none;
  }
  .compare-tag.before {
    left: 14px;
    background: rgba(10,10,10,0.7);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .compare-tag.after {
    right: 14px;
    background: rgba(196,168,130,0.15);
    color: var(--accent);
    border: 1px solid rgba(196,168,130,0.3);
  }

  /* ── Footer ── */
  footer {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2rem;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--accent2); text-decoration: none; }
  footer a:hover { color: var(--accent); }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-vignette"></div>

  <div class="hero-content">

    <div class="logo">
      <img src="logo.png" alt="" class="logo-icon">
      DITHERIUM
    </div>

    <h1 class="headline">
      Turn photos into<br><em>dot-matrix art</em>
    </h1>

    <p class="sub">
      A browser-based dithering studio. Load any image or video,
      tune the algorithm, shape, and tone — export as PNG or SVG.
    </p>

    <a href="editor.html" class="cta-btn">
      Launch Editor
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>

    <span class="hint">No install. No account. Runs in your browser.</span>

  </div>
</section>

<!-- Before / After comparison -->
<div class="compare-section">
  <div class="section-label">Example output</div>

  <div class="compare-wrap" id="compareWrap">
    <!-- BEFORE: plain photo (simulated by grayscale filter on same image) -->
    <img class="compare-before" src="hero.jpg" alt="Original photo">
    <!-- AFTER: dithered version -->
    <img class="compare-after" id="afterImg" src="hero.jpg" alt="Dithered output">

    <div class="compare-divider" id="divider"></div>
    <div class="compare-handle" id="handle">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M4 7H1M1 7l2-2M1 7l2 2M10 7h3M13 7l-2-2M13 7l-2 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </div>

    <span class="compare-tag before">Original</span>
    <span class="compare-tag after">Dithered</span>
  </div>
</div>

<footer>
  Built with &lt;canvas&gt; — <a href="editor.html">Open Editor</a>
</footer>

<script>
  // ── Before / After slider ──
  const wrap   = document.getElementById('compareWrap');
  const after  = document.getElementById('afterImg');
  const divider = document.getElementById('divider');
  const handle  = document.getElementById('handle');
  let pct = 50;
  let dragging = false;

  function setDivider(x) {
    const rect = wrap.getBoundingClientRect();
    pct = Math.max(5, Math.min(95, ((x - rect.left) / rect.width) * 100));
    const p = pct.toFixed(2);
    divider.style.left = p + '%';
    handle.style.left  = p + '%';
    after.style.clipPath = `inset(0 ${(100 - pct).toFixed(2)}% 0 0)`;
  }

  // initialise
  setDivider(wrap.getBoundingClientRect().left + wrap.getBoundingClientRect().width * 0.5);

  wrap.addEventListener('mousedown', e => { dragging = true; setDivider(e.clientX); });
  window.addEventListener('mousemove', e => { if (dragging) setDivider(e.clientX); });
  window.addEventListener('mouseup',   () => { dragging = false; });

  wrap.addEventListener('touchstart', e => { dragging = true; setDivider(e.touches[0].clientX); }, { passive: true });
  window.addEventListener('touchmove', e => { if (dragging) setDivider(e.touches[0].clientX); }, { passive: true });
  window.addEventListener('touchend',  () => { dragging = false; });

  // ── dither the "after" image on canvas to make it look processed ──
  // We render the dithered version of the same hero.jpg into a canvas
  // and use it as the data URL for the after image.
  (function buildDithered() {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() {
      const COLS = 90;
      const aspect = img.naturalWidth / img.naturalHeight;
      const rows   = Math.round(COLS / aspect);
      const cellW  = img.naturalWidth  / COLS;
      const cellH  = img.naturalHeight / rows;

      // sample source
      const src = document.createElement('canvas');
      src.width  = img.naturalWidth;
      src.height = img.naturalHeight;
      const sctx = src.getContext('2d');
      sctx.drawImage(img, 0, 0);
      const px = sctx.getImageData(0, 0, src.width, src.height).data;

      // output canvas at 2× for crisp look
      const scale = 2;
      const outW  = img.naturalWidth  * scale;
      const outH  = img.naturalHeight * scale;
      const out   = document.createElement('canvas');
      out.width  = outW;
      out.height = outH;
      const octx = out.getContext('2d');
      octx.fillStyle = '#0a0a0a';
      octx.fillRect(0, 0, outW, outH);

      // Bayer 4×4 ordered dither matrix
      const bayer = [
         0,  8,  2, 10,
        12,  4, 14,  6,
         3, 11,  1,  9,
        15,  7, 13,  5
      ];

      const TONES = 7;
      const toneColors = ['#0d0d0d','#2b2b2b','#555555','#808080','#aaaaaa','#d4d4d4','#f5f5f5'];

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < COLS; col++) {
          // sample avg brightness of this cell
          let sum = 0, count = 0;
          const x0 = Math.floor(col * cellW);
          const y0 = Math.floor(row * cellH);
          const x1 = Math.min(Math.floor((col+1) * cellW), img.naturalWidth - 1);
          const y1 = Math.min(Math.floor((row+1) * cellH), img.naturalHeight - 1);
          for (let y = y0; y < y1; y++) {
            for (let x = x0; x < x1; x++) {
              const i = (y * img.naturalWidth + x) * 4;
              sum += 0.299*px[i] + 0.587*px[i+1] + 0.114*px[i+2];
              count++;
            }
          }
          let lum = count ? sum / count : 0;

          // bayer threshold
          const bi = (row % 4) * 4 + (col % 4);
          const threshold = (bayer[bi] / 16) * 255;
          lum = lum > threshold ? Math.min(255, lum + 20) : Math.max(0, lum - 20);

          // map to tone level
          const toneIdx = Math.round((lum / 255) * (TONES - 1));
          const sc = (lum / 255) * 0.75 + 0.15; // radius scale by brightness

          const cx = (col + 0.5) * cellW * scale;
          const cy = (row + 0.5) * cellH * scale;
          const cellSize = Math.min(cellW, cellH) * scale;
          const r = (cellSize / 2) * sc * 0.9;

          if (r < 0.4) continue;

          octx.beginPath();
          octx.arc(cx, cy, r, 0, Math.PI * 2);
          octx.fillStyle = toneColors[toneIdx];
          octx.fill();
        }
      }

      after.src = out.toDataURL('image/jpeg', 0.92);
    };
    img.src = 'hero.jpg';
  })();
</script>

</body>
</html>
